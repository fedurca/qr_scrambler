<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>het68 QR</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, Consolas, monospace;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: min(100%, 360px);
    }

    #qr {
      width: 100%;
      aspect-ratio: 1;
      background: #fff;
      padding: 16px;
    }

    #qr canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #url {
      margin: 0;
      width: 100%;
      text-align: center;
      font-size: clamp(12px, 3.4vw, 15px);
      line-height: 1.4;
      word-break: break-all;
      color: #d0d0d0;
    }
  </style>
</head>
<body>
  <main>
    <div id="qr" aria-label="QR kód"></div>
    <p id="url"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script>
    /**
     * Maximální ECC = Level H.
     * Pevná vyšší verze (10) než je nutné pro krátkou URL:
     * většina kapacity je padding, takže sekundové změny epochy
     * přepisují menší podíl modulů a působí méně rušivě.
     */
    const QR_OPTS = {
      errorCorrectionLevel: "H",
      version: 10,
      margin: 2,
      width: 320,
      color: {
        dark: "#000000",
        light: "#ffffff"
      }
    };

    const qrHost = document.getElementById("qr");
    const urlEl = document.getElementById("url");
    const canvas = document.createElement("canvas");
    qrHost.appendChild(canvas);

    let lastUrl = "";

    function buildUrl(epoch) {
      return "https://het68.cz/?qr=" + epoch;
    }

    function render(url) {
      return QRCode.toCanvas(canvas, url, QR_OPTS);
    }

    function tick() {
      const url = buildUrl(Math.floor(Date.now() / 1000));
      if (url === lastUrl) return;
      lastUrl = url;
      urlEl.textContent = url;
      render(url).catch(function (err) {
        console.error(err);
      });
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
